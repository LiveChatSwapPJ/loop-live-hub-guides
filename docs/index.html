<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LoopLive 操作手順</title>
  <meta name="description" content="LoopLive 操作手順の入口ページ（管理者向け / ユーザー向け）" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">本文へスキップ</a>
  <div class="layout">
    <nav class="nav" aria-label="ページ選択" id="tocNav">
      <div class="nav__top">
        <p class="nav__title"><a href="index.html">LoopLive 操作手順</a></p>
        <div class="nav__actions">
          <button class="theme-toggle" id="themeToggle" type="button">ダーク</button>
          <button class="nav__menu-btn" id="navMenuBtn" type="button" aria-controls="navList" aria-expanded="false">メニュー</button>
        </div>
      </div>
      <ul class="nav__list" id="navList">
        <li><a href="admin.html">管理者向け手順書</a></li>
        <li><a href="user.html">ユーザー向け手順書</a></li>
      </ul>
    </nav>
    <main id="main">
      <header class="hero">
        <h1>LoopLive 操作手順</h1>
        <p>用途に合わせて、管理者向けまたはユーザー向けの手順書を選択してください。</p>
      </header>

      <section>
        <h2>手順書を選ぶ</h2>
        <div class="step-shots" aria-label="手順書選択">
          <article class="step-shot">
            <header class="step-shot__head">
              <span class="step-shot__no">A</span>
              <span class="step-shot__title">管理者向け手順書</span>
            </header>
            <div class="step-shot__text">
              <p>初期設定、配信者追加、写真フェイススワップ、利用料金確認、ユーザー情報変更をまとめています。</p>
              <p><a href="admin.html">管理者向けページを開く</a></p>
            </div>
          </article>
          <article class="step-shot">
            <header class="step-shot__head">
              <span class="step-shot__no">B</span>
              <span class="step-shot__title">ユーザー向け手順書</span>
            </header>
            <div class="step-shot__text">
              <p>アカウント作成方法とリアルタイム加工の使い方をまとめています。</p>
              <p><a href="user.html">ユーザー向けページを開く</a></p>
            </div>
          </article>
        </div>
      </section>

      <footer class="site-footer">
        <p>© 2025 Copel Inc. All rights reserved.</p>
      </footer>
    </main>
  </div>
  <script>
    (function () {
      const body = document.body;
      const themeToggle = document.getElementById('themeToggle');
      const nav = document.getElementById('tocNav');
      const navMenuBtn = document.getElementById('navMenuBtn');

      function getInitialTheme() {
        const saved = localStorage.getItem('looplive-theme');
        if (saved === 'dark' || saved === 'light') return saved;
        return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }
      function updateThemeButton(theme) {
        if (!themeToggle) return;
        themeToggle.textContent = theme === 'dark' ? 'ライト' : 'ダーク';
      }
      function applyTheme(theme) {
        body.dataset.theme = theme;
        try { localStorage.setItem('looplive-theme', theme); } catch (e) {}
        updateThemeButton(theme);
      }

      applyTheme(getInitialTheme());
      if (themeToggle) {
        themeToggle.addEventListener('click', function () {
          applyTheme(body.dataset.theme === 'dark' ? 'light' : 'dark');
        });
      }
      if (navMenuBtn && nav) {
        navMenuBtn.addEventListener('click', function () {
          const isOpen = nav.classList.toggle('nav--open');
          navMenuBtn.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
        });
      }
    })();
  </script>
</body>
</html>
